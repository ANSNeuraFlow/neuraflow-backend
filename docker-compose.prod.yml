services:
  prestart:
    image: neuraflow/backend:prod
    build:
      target: prod
    environment:
      NODE_ENV: production
  app:
    image: neuraflow/backend:prod
    build:
      target: prod
    environment:
      NODE_ENV: production
    env_file:
      - .env.prod
    ports:
      - 4000:4000
      - 5000:5000
      - 5001:5001
    command: pnpm run start:prod
