services:
  prestart:
    image: neuraflow/backend:dev
    build:
      target: dev
    environment:
      NODE_ENV: development
  app:
    image: neuraflow/backend:dev
    build:
      target: dev
    environment:
      NODE_ENV: development
    env_file:
      - .env.dev
    ports:
      - 4000:4000
      - 5000:5000
      - 5001:5001
      - 9229:9229
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    working_dir: /app
    command: pnpm run start:debug
    tty: true
    stdin_open: true

  db:
    ports:
      - '5432:5432'

volumes:
  node_modules:
