services:
  prestart:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
        restart: true
    environment:
      DATABASE_URL: postgres://postgres:postgres@db/neuraflow-backend
    command: pnpm prestart
  app:
    build:
      context: .
    environment:
      DATABASE_URL: postgres://postgres:postgres@db/neuraflow-backend
      API_PORT: 4000
      VIDEO_STREAM_ENABLED: 'true'
      RTMP_INGEST_PORT: 1935
      RTMP_PUBLIC_HOST: 127.0.0.1
      MEDIASOUP_LISTEN_IP: 0.0.0.0
      MEDIASOUP_ANNOUNCED_IP: 127.0.0.1
      WEBRTC_MIN_PORT: 10000
      WEBRTC_MAX_PORT: 10100
    restart: unless-stopped
    ports:
      - 4000:4000
      - 1935:1935
      - 10000-10100:10000-10100/udp
      - 5000:5000
      - 5001:5001
    depends_on:
      db:
        condition: service_healthy
        restart: true
      prestart:
        condition: service_completed_successfully

  db:
    image: postgres:latest
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=neuraflow-backend
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d neuraflow-backend']
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - db

volumes:
  pgdata:
